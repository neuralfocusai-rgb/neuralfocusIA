<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncio Extremo - Casino 132</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Contenedor principal */
        .anuncio-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 800px;
            position: relative;
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            overflow: hidden;
            border: 4px solid #ffd700;
        }

        /* --- FONDO DE CASINO: RULETA GIRANDO --- */
        .ruleta-fondo {
            position: absolute;
            top: 10%;
            left: -50%;
            width: 600px; /* Ruleta más grande */
            height: 600px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Roulette_wheel.svg/1024px-Roulette_wheel.svg.png') no-repeat center;
            background-size: contain;
            opacity: 0.3;
            animation: girarRuleta 20s linear infinite;
            z-index: 1;
        }

        @keyframes girarRuleta {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- AVATARES GIGANTES --- */
        .avatar {
            position: absolute;
            bottom: 5%; /* Apoyados casi abajo */
            height: 70%; /* GIGANTES: ocupan el 70% de la altura de la pantalla */
            z-index: 2; /* Detrás de la lluvia y del recuadro de video */
            filter: drop-shadow(10px 10px 20px rgba(0,0,0,0.9));
        }

        /* Avatar Izquierdo */
        .avatar-izq {
            left: -15%; /* Se sale un poco de la pantalla para dar efecto de tamaño */
            animation: baileIzq 0.6s infinite alternate ease-in-out;
        }

        /* Avatar Derecho */
        .avatar-der {
            right: -15%;
            transform: scaleX(-1); /* Lo invertimos para que mire al centro */
            animation: baileDer 0.7s infinite alternate ease-in-out;
        }

        @keyframes baileIzq {
            0% { transform: translateY(0) rotate(-2deg) scale(1); }
            100% { transform: translateY(-20px) rotate(3deg) scale(1.05); }
        }

        @keyframes baileDer {
            0% { transform: scaleX(-1) translateY(0) rotate(2deg) scale(1); }
            100% { transform: scaleX(-1) translateY(-15px) rotate(-3deg) scale(1.05); }
        }

        /* --- TÍTULO QUE SE MUEVE POR TODA LA PANTALLA --- */
        .titulo-flotante {
            position: absolute;
            font-size: 3rem;
            color: #fff;
            white-space: nowrap;
            text-shadow: 0 0 15px #ffd700, 0 0 30px #ff0000, 5px 5px 10px rgba(0,0,0,1);
            z-index: 6; /* Por encima de todo */
            pointer-events: none;
            /* Esta animación hace que viaje por los bordes y el centro */
            animation: volarPantalla 8s linear infinite alternate;
        }

        @keyframes volarPantalla {
            0%   { top: 5%;  left: -10%; transform: scale(0.8) rotate(-10deg); }
            25%  { top: 75%; left: 30%;  transform: scale(1.2) rotate(15deg); }
            50%  { top: 20%; left: 60%;  transform: scale(0.9) rotate(-5deg); }
            75%  { top: 60%; left: -5%;  transform: scale(1.1) rotate(10deg); }
            100% { top: 10%; left: 50%;  transform: scale(1) rotate(0deg); }
        }

        /* --- MARCO PARA TU VIDEO EN CAPCUT --- */
        .marco-superposicion {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 40%;
            border: 6px solid #00ffcc;
            box-shadow: 0 0 30px #00ffcc, inset 0 0 20px rgba(0, 255, 204, 0.7);
            border-radius: 15px;
            background: #00ff00; /* Verde puro para borrarlo en CapCut (Chroma Key) */
            z-index: 4; /* Delante de los avatares, detrás del texto */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- LLUVIA EXTREMA --- */
        .lluvia-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 3; /* Delante de los avatares para que los cubra */
        }

        .particula {
            position: absolute;
            top: -100px;
            animation: caer linear infinite;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.8));
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(900px) rotate(720deg); opacity: 0; }
        }

        /* --- BANNER INFERIOR --- */
        .footer-anuncio {
            position: absolute;
            bottom: 2%;
            width: 96%;
            left: 2%;
            z-index: 5;
        }

        .banner-abigail {
            background: linear-gradient(90deg, #ff0000, #ff8800);
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 1.1rem;
            border-radius: 12px;
            box-shadow: 0 0 20px #ff0000;
            border: 3px solid #fff;
            text-transform: uppercase;
            animation: pulsoTexto 0.5s infinite alternate;
        }

        @keyframes pulsoTexto {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="anuncio-container">
        <div class="ruleta-fondo"></div>

        <img class="avatar avatar-izq" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/68.png" alt="Avatar Gigante Izquierda">
        <img class="avatar avatar-der" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/106.png" alt="Avatar Gigante Derecha">

        <div class="lluvia-container" id="lluvia"></div>

        <div class="marco-superposicion"></div>

        <h1 class="titulo-flotante">CASINO 132</h1>

        <div class="footer-anuncio">
            <div class="banner-abigail">
                🔥 ¡Los paneles de Abigail explotan! 🔥
            </div>
        </div>
    </div>

    <script>
        const lluviaContainer = document.getElementById('lluvia');
        // Agregamos máquinas tragamonedas, bolsas, monedas y billetes
        const elementos = ['💵', '💸', '💰', '🪙', '🎰', '💲']; 

        function crearParticula() {
            const particula = document.createElement('div');
            particula.classList.add('particula');
            particula.innerText = elementos[Math.floor(Math.random() * elementos.length)];
            
            // Posición horizontal
            particula.style.left = Math.random() * 110 - 5 + '%'; 
            
            // Tamaños brutales y variados (entre 20px y 60px) para dar perspectiva
            const tamaño = Math.random() * (60 - 20) + 20;
            particula.style.fontSize = tamaño + 'px';
            
            // Caen más rápido y a diferentes velocidades (entre 1.5 y 3.5 segundos)
            const duracion = Math.random() * (3.5 - 1.5) + 1.5;
            particula.style.animationDuration = duracion + 's';
            
            lluviaContainer.appendChild(particula);

            setTimeout(() => {
                particula.remove();
            }, duracion * 1000);
        }

        // Genera 3 partículas a la vez cada 50 milisegundos = ¡Tormenta brutal!
        setInterval(() => {
            crearParticula();
            crearParticula();
            crearParticula();
        }, 50);
    </script>
</body>
</html>
