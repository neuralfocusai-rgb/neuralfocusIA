<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncio Premium - Casino 132</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Contenedor formato celular (9:16) */
        .anuncio-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 800px;
            position: relative;
            background: radial-gradient(circle, #0a3318 0%, #000000 100%);
            overflow: hidden;
            border: 4px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        /* --- FONDO DE CASINO: RULETA GIRANDO --- */
        .ruleta-fondo {
            position: absolute;
            top: 5%;
            left: -30%;
            width: 400px;
            height: 400px;
            /* Usamos un SVG transparente de una ruleta */
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Roulette_wheel.svg/1024px-Roulette_wheel.svg.png') no-repeat center;
            background-size: contain;
            opacity: 0.25;
            animation: girarRuleta 15s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes girarRuleta {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- EFECTO: TORMENTA DE BILLETES --- */
        .lluvia-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .particula {
            position: absolute;
            top: -50px;
            opacity: 0.9;
            animation: caer linear infinite;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8));
        }

        @keyframes caer {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(850px) rotate(720deg); opacity: 0; }
        }

        /* --- TEXTOS ANIMADOS (CASINO 132 Y JACKPOT) --- */
        .header-anuncio {
            position: absolute;
            top: 3%;
            width: 100%;
            text-align: center;
            z-index: 5;
            padding: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contador estilo Slots */
        .jackpot-container {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ffcc;
            padding: 5px 15px;
            border-radius: 20px;
            color: #00ffcc;
            font-size: 1.1rem;
            margin-bottom: 8px;
            box-shadow: 0 0 10px #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        /* Título con movimiento 3D y brillo */
        .titulo-casino {
            font-size: 2.5rem;
            color: #fff;
            letter-spacing: 2px;
            animation: movimientoTitulo 2s infinite alternate ease-in-out;
        }

        @keyframes movimientoTitulo {
            0% { 
                transform: perspective(400px) rotateY(-10deg) scale(1); 
                text-shadow: 0 0 10px #ffd700, 0 5px 5px rgba(0,0,0,0.8); 
            }
            100% { 
                transform: perspective(400px) rotateY(10deg) scale(1.05); 
                text-shadow: 0 0 25px #ff0055, 0 0 40px #ffd700, 0 5px 5px rgba(0,0,0,0.8); 
            }
        }

        /* --- MARCO DE SUPERPOSICIÓN PARA CAPCUT --- */
        .marco-superposicion {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 38%;
            border: 5px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc, inset 0 0 15px rgba(0,255,204,0.5);
            border-radius: 12px;
            background: #00ff00; /* Fondo verde Chroma Key */
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .marco-label {
            color: #000;
            background: #00ffcc;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* --- LOS DOS AVATARES REALISTAS --- */
        .avatar {
            position: absolute;
            bottom: 12%;
            width: 150px;
            height: 180px;
            z-index: 6;
            filter: drop-shadow(5px 10px 15px rgba(0,0,0,0.9));
        }

        /* Avatar Izquierdo */
        .avatar-izq {
            left: 2%;
            animation: baileIzq 0.7s infinite alternate ease-in-out;
        }

        /* Avatar Derecho */
        .avatar-der {
            right: 2%;
            animation: baileDer 0.8s infinite alternate ease-in-out;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes baileIzq {
            0% { transform: translateY(0) rotate(-4deg); }
            100% { transform: translateY(-12px) rotate(2deg); }
        }

        @keyframes baileDer {
            0% { transform: translateY(-5px) rotate(4deg); }
            100% { transform: translateY(-15px) rotate(-2deg); }
        }

        /* --- BANNER INFERIOR --- */
        .footer-anuncio {
            position: absolute;
            bottom: 3%;
            width: 96%;
            left: 2%;
            z-index: 5;
        }

        .banner-abigail {
            background: linear-gradient(90deg, #ff0055, #990022);
            color: #fff;
            padding: 12px;
            text-align: center;
            font-size: 1rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(255,0,85,0.6);
            border: 2px solid #fff;
            text-transform: uppercase;
            animation: pulsoTexto 1s infinite alternate;
        }

        @keyframes pulsoTexto {
            0% { transform: scale(0.98); }
            100% { transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div class="anuncio-container">
        <div class="ruleta-fondo"></div>

        <div class="lluvia-container" id="lluvia"></div>

        <div class="header-anuncio">
            <div class="jackpot-container">
                🎰 POZO ACUMULADO: $<span id="slot-counter">1,250,000</span>
            </div>
            <h1 class="titulo-casino">CASINO 132</h1>
        </div>

        <div class="marco-superposicion">
            <span class="marco-label">Espacio Video</span>
        </div>

        <div class="avatar avatar-izq">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbms1eWR5eW15bXN0NXg0bmN6M3M4Z3R5Y3I4ZndvN3R0ZzVwbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/39GAXp1VCPhx6/giphy.gif" alt="Avatar Izquierda">
        </div>

        <div class="avatar avatar-der">
            <img src="https://media.giphy.com/media/l41Yh18f5TbiWHE0o/giphy.gif" alt="Avatar Derecha">
        </div>

        <div class="footer-anuncio">
            <div class="banner-abigail">
                🔥 ¡Los paneles de Abigail explotan! 🔥
            </div>
        </div>
    </div>

    <script>
        // 1. Lluvia de Billetes y Monedas
        const lluviaContainer = document.getElementById('lluvia');
        const elementos = ['💵', '💸', '🪙', '💎']; // Agregamos diamantes

        function crearParticula() {
            const particula = document.createElement('div');
            particula.classList.add('particula');
            particula.innerText = elementos[Math.floor(Math.random() * elementos.length)];
            
            // Posición, tamaño y duración aleatorias para efecto 3D
            particula.style.left = Math.random() * 100 + '%';
            const tamaño = Math.random() * (35 - 15) + 15;
            particula.style.fontSize = tamaño + 'px';
            const duracion = Math.random() * (4 - 2) + 2;
            particula.style.animationDuration = duracion + 's';
            
            lluviaContainer.appendChild(particula);

            setTimeout(() => {
                particula.remove();
            }, duracion * 1000);
        }

        // Genera partículas continuamente
        setInterval(crearParticula, 120);

        // 2. Contador de Slots en vivo (Pozo acumulado)
        let pozo = 1250000;
        const contadorElemento = document.getElementById('slot-counter');

        setInterval(() => {
            // Suma montos aleatorios rápidos para simular una maquinita tragamonedas
            pozo += Math.floor(Math.random() * 1500) + 100;
            // Formatea el número con puntos (ej: 1.250.500)
            contadorElemento.innerText = pozo.toLocaleString('es-AR');
        }, 150);
    </script>
</body>
</html>
