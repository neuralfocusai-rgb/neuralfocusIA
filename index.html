<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuncio Profesional - Casino 132</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', sans-serif;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Contenedor formato celular (9:16) profesional */
        .anuncio-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 800px;
            position: relative;
            background: radial-gradient(circle, #002f13 0%, #000000 100%); /* Fondo verde casino profundo */
            overflow: hidden;
            border: 4px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        /* --- EFECTO: TORMENTA DE BILLETES Y LLUVIA DE MONEDAS --- */
        .lluvia-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .particula {
            position: absolute;
            top: -50px;
            font-size: 24px;
            opacity: 0.85;
            animation: caer linear infinite;
        }

        @keyframes caer {
            0% {
                transform: translateY(0) rotate(0deg) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(850px) rotate(720deg) translateX(50px);
                opacity: 0.3;
            }
        }

        /* --- DISEÑO: MARCO DE SUPERPOSICIÓN PARA CAPCUT --- */
        /* Este recuadro actúa como marcador de posición transparente o Chroma Key */
        .marco-superposicion {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            height: 40%;
            border: 5px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            border-radius: 12px;
            background: #00ff00; /* Fondo verde puro para usar como Chroma Key si lo deseas, o dejarlo vacío */
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .marco-label {
            color: #000;
            background: #00ffcc;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* --- PERSONAJE: AVATAR BAILANDO --- */
        .avatar-container {
            position: absolute;
            bottom: 15%;
            right: 5%;
            width: 160px;
            height: 160px;
            z-index: 4;
            filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.7));
            animation: ritmoCumbia 0.6s infinite alternate ease-in-out;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @keyframes ritmoCumbia {
            0% { transform: translateY(0) rotate(-3deg) scale(1); }
            100% { transform: translateY(-8px) rotate(3deg) scale(1.05); }
        }

        /* --- TEXTOS COMERCIALES PROFESIONALES --- */
        .header-anuncio {
            position: absolute;
            top: 4%;
            width: 100%;
            text-align: center;
            z-index: 5;
            padding: 0 10px;
        }

        .titulo-casino {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 10px #ffd700, 0 0 20px #ff8800;
            letter-spacing: 2px;
        }

        .subtitulo-casino {
            font-size: 1.2rem;
            color: #ffd700;
            text-shadow: 0 0 5px #000;
            margin-top: 2px;
        }

        .footer-anuncio {
            position: absolute;
            bottom: 4%;
            width: 90%;
            left: 5%;
            z-index: 5;
        }

        .banner-abigail {
            background: linear-gradient(90deg, #ff0055, #990022);
            color: #fff;
            padding: 12px;
            text-align: center;
            font-size: 0.95rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(255,0,85,0.4);
            border: 2px solid #ff0055;
            letter-spacing: 0.5px;
            animation: pulsoTexto 1.5s infinite alternate;
        }

        @keyframes pulsoTexto {
            0% { transform: scale(0.98); box-shadow: 0 4px 10px rgba(255,0,85,0.4); }
            100% { transform: scale(1.02); box-shadow: 0 4px 20px rgba(255,0,85,0.8); }
        }
    </style>
</head>
<body>

    <div class="anuncio-container">
        <!-- Contenedor de la tormenta de dinero generada por JS -->
        <div class="lluvia-container" id="lluvia"></div>

        <!-- Encabezado del Anuncio -->
        <div class="header-anuncio">
            <h1 class="titulo-casino">CASINO 132</h1>
            <p class="subtitulo-casino">¡VENÍ A GANAR, NO PIERDAS ESTA OPORTUNIDAD!</p>
        </div>

        <!-- Marco de Superposición para CapCut -->
        <div class="marco-superposicion">
            <span class="marco-label">Tu video aquí</span>
        </div>

        <!-- Avatar Animado (Famoso/Dibujo con Camiseta de Argentina) -->
        <div class="avatar-container">
            <!-- REEMPLAZA ESTA URL POR EL GIF DE TU AVATAR BAILANDO -->
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbms1eWR5eW15bXN0NXg0bmN6M3M4Z3R5Y3I4ZndvN3R0ZzVwbiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/39GAXp1VCPhx6/giphy.gif" alt="Avatar Bailando">
        </div>

        <!-- Banner Inferior Dinámico -->
        <div class="footer-anuncio">
            <div class="banner-abigail">
                💥 LOS PANELES DE ABIGAIL EXPLOTAN TODOS LOS DÍAS 💥
            </div>
        </div>
    </div>

    <!-- Script para generar la tormenta continua de billetes y monedas -->
    <script>
        const lluviaContainer = document.getElementById('lluvia');
        const elementos = ['💵', '💰', '🪙', '✨'];

        function crearParticula() {
            const particula = document.createElement('div');
            particula.classList.add('particula');
            
            // Selecciona un elemento al azar (billete, bolsa o moneda)
            particula.innerText = elementos[Math.floor(Math.random() * elementos.length)];
            
            // Posición horizontal aleatoria
            particula.style.left = Math.random() * 100 + '%';
            
            // Tamaño y velocidad aleatoria para simular profundidad 3D
            const tamaño = Math.random() * (30 - 15) + 15;
            particula.style.fontSize = tamaño + 'px';
            
            const duracion = Math.random() * (4 - 2) + 2; // Entre 2 y 4 segundos
            particula.style.animationDuration = duracion + 's';
            
            lluviaContainer.appendChild(particula);

            // Elimina el elemento cuando termina de caer para no saturar el navegador
            setTimeout(() => {
                particula.remove();
            }, duracion * 1000);
        }

        // Genera una nueva moneda o billete cada 100 milisegundos (Tormenta continua)
        setInterval(crearParticula, 100);
    </script>
</body>
</html>
